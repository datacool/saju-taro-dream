<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0b3d"/>
      <stop offset="100%" stop-color="#0B1326"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 원 -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- 글로우 -->
  <circle cx="16" cy="16" r="13" fill="url(#glow)"/>

  <!-- 바깥 링 -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.7"/>

  <!-- 안쪽 링 -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#A78BFA" stroke-width="0.5" opacity="0.4"/>

  <!-- ✦ 사각별 — 세로 다이아몬드 -->
  <polygon points="16,6 17.8,14.2 16,22 14.2,14.2" fill="#C4B5FD" opacity="0.9"/>
  <!-- ✦ 사각별 — 가로 다이아몬드 -->
  <polygon points="6,16 14.2,14.2 26,16 14.2,17.8" fill="#C4B5FD" opacity="0.9"/>

  <!-- 중심 점 -->
  <circle cx="16" cy="16" r="2.2" fill="#EDE9FE"/>

  <!-- 대각선 작은 점 4개 -->
  <circle cx="10.5" cy="10.5" r="0.8" fill="#A78BFA" opacity="0.6"/>
  <circle cx="21.5" cy="10.5" r="0.8" fill="#A78BFA" opacity="0.6"/>
  <circle cx="10.5" cy="21.5" r="0.8" fill="#A78BFA" opacity="0.6"/>
  <circle cx="21.5" cy="21.5" r="0.8" fill="#A78BFA" opacity="0.6"/>
</svg>
